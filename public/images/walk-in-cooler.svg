<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#00cc99;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="800" height="600" fill="url(#grad)"/>
    
    <!-- Decorative elements -->
    <circle cx="80" cy="120" r="64" fill="rgba(255,255,255,0.1)"/>
    <circle cx="720" cy="480" r="96" fill="rgba(255,255,255,0.1)"/>
    <circle cx="680" cy="90" r="40" fill="rgba(255,255,255,0.1)"/>
    
    <!-- Snowflake icons -->
    <g fill="rgba(255,255,255,0.2)" transform="translate(40, 60)">
        <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8"/>
    </g>
    <g fill="rgba(255,255,255,0.15)" transform="translate(736, 150) scale(0.8)">
        <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8"/>
    </g>
    
    <!-- Main content box -->
    <rect x="120" y="150" width="560" height="300" rx="20" fill="rgba(255,255,255,0.15)" filter="url(#shadow)"/>
    
    <!-- Title -->
    <text x="400" y="270" text-anchor="middle" fill="#ffffff" font-size="40" font-weight="bold" font-family="Arial, sans-serif">
        Walk-In Cooler
    </text>
    
    <!-- Subtitle -->
    <text x="400" y="348" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="20" font-family="Arial, sans-serif">
        Temperature: 2°C to 8°C
    </text>
    
    <!-- Bottom text -->
    <text x="400" y="540" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="14.399999999999999" font-family="Arial, sans-serif">
        Yichuhui (Zibo) Refrigeration Equipment Co., Ltd.
    </text>
</svg>