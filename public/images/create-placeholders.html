<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Placeholder Images</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .placeholder { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .placeholder svg { width: 100%; height: auto; border-radius: 4px; }
        .placeholder h3 { margin: 10px 0 5px; color: #333; }
        .placeholder p { margin: 0; color: #666; font-size: 14px; }
        button { background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0055aa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Yichuhui - Placeholder Images Generator</h1>
        <p>Right-click on any image below and select "Save image as..." to download it</p>
        
        <div class="image-grid" id="grid"></div>
    </div>

    <script>
        const images = [
            { name: 'hero-bg.jpg', title: 'Hero Background', desc: '1920x1080 - Main hero section background', gradient: 'linear-gradient(135deg, #0066cc 0%, #00cc99 100%)' },
            { name: 'walk-in-freezer.jpg', title: 'Walk-In Freezer', desc: 'Product image for walk-in freezer', gradient: 'linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%)' },
            { name: 'display-case.jpg', title: 'Display Case', desc: 'Product image for display case', gradient: 'linear-gradient(135deg, #065f46 0%, #10b981 100%)' },
            { name: 'ice-machine.jpg', title: 'Ice Machine', desc: 'Product image for ice machine', gradient: 'linear-gradient(135deg, #7c2d12 0%, #ea580c 100%)' },
            { name: 'industrial-chiller.jpg', title: 'Industrial Chiller', desc: 'Product image for industrial chiller', gradient: 'linear-gradient(135deg, #1e1b4b 0%, #6366f1 100%)' },
            { name: 'factory.jpg', title: 'Factory', desc: 'Factory image for about page', gradient: 'linear-gradient(135deg, #374151 0%, #6b7280 100%)' },
            { name: 'logo.png', title: 'Logo', desc: 'Company logo', gradient: 'linear-gradient(135deg, #0066cc 0%, #00cc99 100%)' }
        ];

        const grid = document.getElementById('grid');

        images.forEach(img => {
            const div = document.createElement('div');
            div.className = 'placeholder';
            div.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
                    <defs>
                        <linearGradient id="grad-${img.name.replace(/\./g, '-')}" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#00cc99;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="400" height="300" fill="url(#grad-${img.name.replace(/\./g, '-')})"/>
                    <text x="200" y="150" text-anchor="middle" fill="white" font-size="24" font-weight="bold" font-family="Arial, sans-serif">${img.title}</text>
                    <text x="200" y="180" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="14" font-family="Arial, sans-serif">${img.desc}</text>
                </svg>
                <h3>${img.name}</h3>
                <p>${img.desc}</p>
            `;
            grid.appendChild(div);
        });
    </script>
</body>
</html>
