<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#00cc99;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="1200" height="800" fill="url(#grad)"/>
    
    <!-- Decorative elements -->
    <circle cx="120" cy="160" r="96" fill="rgba(255,255,255,0.1)"/>
    <circle cx="1080" cy="640" r="144" fill="rgba(255,255,255,0.1)"/>
    <circle cx="1020" cy="120" r="60" fill="rgba(255,255,255,0.1)"/>
    
    <!-- Snowflake icons -->
    <g fill="rgba(255,255,255,0.2)" transform="translate(60, 80)">
        <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8"/>
    </g>
    <g fill="rgba(255,255,255,0.15)" transform="translate(1104, 200) scale(0.8)">
        <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8"/>
    </g>
    
    <!-- Main content box -->
    <rect x="180" y="200" width="840" height="400" rx="20" fill="rgba(255,255,255,0.15)" filter="url(#shadow)"/>
    
    <!-- Title -->
    <text x="600" y="360" text-anchor="middle" fill="#ffffff" font-size="60" font-weight="bold" font-family="Arial, sans-serif">
        Yichuhui Factory
    </text>
    
    <!-- Subtitle -->
    <text x="600" y="463.99999999999994" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="30" font-family="Arial, sans-serif">
        State-of-the-Art Manufacturing
    </text>
    
    <!-- Bottom text -->
    <text x="600" y="720" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="21.599999999999998" font-family="Arial, sans-serif">
        Yichuhui (Zibo) Refrigeration Equipment Co., Ltd.
    </text>
</svg>