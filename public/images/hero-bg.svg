<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#00cc99;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="1920" height="1080" fill="url(#grad)"/>
    
    <!-- Decorative elements -->
    <circle cx="192" cy="216" r="153.6" fill="rgba(255,255,255,0.1)"/>
    <circle cx="1728" cy="864" r="230.39999999999998" fill="rgba(255,255,255,0.1)"/>
    <circle cx="1632" cy="162" r="96" fill="rgba(255,255,255,0.1)"/>
    
    <!-- Snowflake icons -->
    <g fill="rgba(255,255,255,0.2)" transform="translate(96, 108)">
        <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8"/>
    </g>
    <g fill="rgba(255,255,255,0.15)" transform="translate(1766.4, 270) scale(0.8)">
        <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8"/>
    </g>
    
    <!-- Main content box -->
    <rect x="288" y="270" width="1344" height="540" rx="20" fill="rgba(255,255,255,0.15)" filter="url(#shadow)"/>
    
    <!-- Title -->
    <text x="960" y="486" text-anchor="middle" fill="#ffffff" font-size="96" font-weight="bold" font-family="Arial, sans-serif">
        Yichuhui - Commercial Refrigeration
    </text>
    
    <!-- Subtitle -->
    <text x="960" y="626.4" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="48" font-family="Arial, sans-serif">
        Premium Quality Equipment
    </text>
    
    <!-- Bottom text -->
    <text x="960" y="972" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="34.559999999999995" font-family="Arial, sans-serif">
        Yichuhui (Zibo) Refrigeration Equipment Co., Ltd.
    </text>
</svg>