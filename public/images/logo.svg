<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#00cc99;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="200" height="60" fill="url(#grad)"/>
    
    <!-- Decorative elements -->
    <circle cx="20" cy="12" r="16" fill="rgba(255,255,255,0.1)"/>
    <circle cx="180" cy="48" r="24" fill="rgba(255,255,255,0.1)"/>
    <circle cx="170" cy="9" r="10" fill="rgba(255,255,255,0.1)"/>
    
    <!-- Snowflake icons -->
    <g fill="rgba(255,255,255,0.2)" transform="translate(10, 6)">
        <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8"/>
    </g>
    <g fill="rgba(255,255,255,0.15)" transform="translate(184, 15) scale(0.8)">
        <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8"/>
    </g>
    
    <!-- Main content box -->
    <rect x="30" y="15" width="140" height="30" rx="20" fill="rgba(255,255,255,0.15)" filter="url(#shadow)"/>
    
    <!-- Title -->
    <text x="100" y="27" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold" font-family="Arial, sans-serif">
        YICHUHUI
    </text>
    
    <!-- Subtitle -->
    <text x="100" y="34.8" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="5" font-family="Arial, sans-serif">
        Refrigeration
    </text>
    
    <!-- Bottom text -->
    <text x="100" y="54" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="3.5999999999999996" font-family="Arial, sans-serif">
        Yichuhui (Zibo) Refrigeration Equipment Co., Ltd.
    </text>
</svg>